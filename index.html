<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Jet Lag Amsterdam</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <button id="menu-toggle" class="map-btn" aria-label="Menu">≡</button>
  <button id="pin-here" class="map-btn" aria-label="Pin at viewport center" title="Pin at viewport center">+</button>

  <div id="therm-banner" class="therm-banner" style="display:none">
    <span>Tap another pin to complete the thermometer</span>
    <button id="cancel-pending-therm">Cancel</button>
  </div>

  <aside id="sidebar" class="sidebar">
    <h3>Layers</h3>
    <div id="layer-grid" class="layer-grid">
      <div class="header"></div>
      <div class="header">Icons</div>
      <div class="header">Zones</div>
    </div>

    <h3>Tools</h3>
    <button id="drop-pin" class="tool-btn">📍 Drop pin here</button>
    <button id="paste-pin" class="tool-btn">📋 Pin from clipboard</button>
    <button id="track-location" class="tool-btn">🔵 Track my location</button>
    <button id="export-pins" class="tool-btn">📤 Export pins</button>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
